name: '[ Start ] Build Project (Java/Maven)'

on:
  workflow_dispatch:
    inputs:
      release_build:
        description: 'toggles an release-build, by default false'
        type: boolean
        default: false
        required: false
      build_version:
        description: 'The version to build and deploy'
        type: string
        required: true
        default: '0-SNAPSHOT'
  workflow_call:
    inputs:
      release_build:
        description: 'toggles an release-build, by default false'
        type: boolean
        default: false
        required: false
      build_version:
        description: 'The version to build and deploy'
        type: string
        required: false
        default: '0-SNAPSHOT'
    outputs:
      build_artifact_id:
        description: 'The id of the uploaded build artifacts.'
        value: ${{ jobs.Build.outputs.build_artifacts_id}}
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Cancel redundant workflow runs for the same branch/PR.
# Never cancel release builds – only cancel CI (non-release) runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !(inputs.release_build || false) }}


env:
  BUILD_VERSION: ${{ inputs.build_version != '' && inputs.build_version || '0-SNAPSHOT' }}

jobs:
  Build:
    permissions:
      contents: read
      pull-requests: read
      packages: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      build_artifacts_id: ${{ steps.BuildArtifactUpload.outputs.artifact-id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v5.1.0
        with:
          distribution: temurin
          java-version: 25
          cache: 'maven'
          cache-dependency-path: '**/pom.xml'
          server-id: 'github'
          gpg-private-key: ${{ secrets.GPG_SIGNING_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE  # env-var NAME, not the secret value

      - name: Cache SonarQube packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Set version
        if: ${{ inputs.release_build }}
        run: ./mvnw versions:set -DnewVersion="$BUILD_VERSION" -DgenerateBackupPoms=false

      - name: Build project, run unit and integration tests
        id: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONARCLOUD_TOKEN }}
        run: >
          ./mvnw -T1C --batch-mode clean install

      - name: Define branch name where the scan results are added to in Sonarcloud
        if: ${{ github.actor != 'dependabot[bot]' && !inputs.release_build }}
        id: branch_to_scan
        env:
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          BRANCH_TO_SCAN: ${{ github.head_ref || github.ref_name }}
        run: |
          echo "github.head_ref - pull request: $HEAD_REF"
          echo "github.ref_name - push        : $REF_NAME"
          echo "event                         : $EVENT_NAME"
          echo "branch name to scan           : $BRANCH_TO_SCAN"
          echo "name=$BRANCH_TO_SCAN" >> "$GITHUB_OUTPUT"

      - name: Sonar scan
        if: ${{ github.actor != 'dependabot[bot]' && !inputs.release_build }}
        id: sonar_scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONARCLOUD_TOKEN }}
          SONAR_BRANCH_NAME: ${{ steps.branch_to_scan.outputs.name }}
        run: >
          ./mvnw --batch-mode -ntp --no-snapshot-updates org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.branch.name="$SONAR_BRANCH_NAME" -Dsonar.token="$SONAR_TOKEN"
          -Dsonar.projectKey=p3t_spring-cursorpaging

      - name: Javadoc and sign artifacts
        if: ${{ inputs.release_build }}
        run: ./mvnw -T1C --batch-mode package gpg:sign -Dgpg.signer=bc
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_SIGNING_KEY_PASSWORD }}
          MAVEN_GPG_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GITHUB_DEPENDENCY_GRAPH_ENABLED: false

      - name: (Info) Display structure of files
        if: ${{ runner.debug == '1' }}
        run: tree

      - name: Upload build artifacts
        if: ${{ inputs.release_build }}
        id: BuildArtifactUpload
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts-${{ env.BUILD_VERSION }}
          path: |
            ./**/target/*${{ env.BUILD_VERSION }}*.jar
            ./**/target/*${{ env.BUILD_VERSION }}*.pom
            ./**/target/*${{ env.BUILD_VERSION }}*.zip
            ./**/target/*${{ env.BUILD_VERSION }}*.asc
            ./**/target/reports/
            ./LICENSE
            ./README.md
            ./cursorpaging-docs/user/*.md
          retention-days: 10
